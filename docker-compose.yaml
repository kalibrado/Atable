services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atable-app
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    volumes:
      - ./logs:/app/logs
      - ./sessions.db:/app/sessions.db
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge